<div
  class="app-loader"
  [class.app-loader--fullscreen]="fullScreen()"
  role="status"
  aria-live="polite"
>
  <svg
    class="app-loader__cart"
    viewBox="0 0 48 48"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
    aria-hidden="true"
  >
    <path
      d="M6 8h4l3.6 20.4a3 3 0 0 0 3 2.6h16.2a3 3 0 0 0 2.94-2.4L39 16H12"
      stroke="var(--color-primary)"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle class="app-loader__wheel" cx="19" cy="40" r="3" fill="var(--color-primary)" />
    <circle class="app-loader__wheel" cx="33" cy="40" r="3" fill="var(--color-primary)" />
  </svg>

  <div class="app-loader__wordmark">
    <span>Smart</span><span class="app-loader__accent">Kart</span>
  </div>

  <div class="app-loader__dots">
    <span></span><span></span><span></span>
  </div>

  <p class="app-loader__message">{{ message() }}</p>
</div>
